<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ADPEL Bíblia">
  <title>Bíblia Sagrada | ADPEL Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; }
    .chapter-btn { min-width: 2.5rem; height: 2.5rem; display: inline-flex; align-items: center; justify-content: center; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 600; transition: all 0.2s; background-color: rgba(30,41,59,0.6); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; cursor: pointer; }
    .chapter-btn:hover { background-color: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.4); color: #60a5fa; }
    .chapter-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
    .verse-num { color: #92400e; font-weight: 700; font-size: 0.75em; vertical-align: super; margin-right: 0.3rem; font-family: 'Inter', sans-serif; }
    #bible-verses-content p { margin-bottom: 0.6rem; text-indent: 0; }
    @media (min-width: 768px) {
      #bible-verses-content { columns: 2; column-gap: 2.5rem; }
      #bible-verses-content p { break-inside: avoid; }
    }
    .pergaminho { background-color: #fdf6e3; border: 2px solid #d4c5a9; color: #2c1810; font-family: 'Playfair Display', serif; }
    .bg-adpel-600 { background-color: #2563eb; }
    .hover\:bg-adpel-700:hover { background-color: #1d4ed8; }
    .text-adpel-700 { color: #1d4ed8; }
    .border-adpel-100 { border-color: #dbeafe; }
    .bg-adpel-50 { background-color: #eff6ff; }
    .text-adpel-600 { color: #2563eb; }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-[#0f172a]/90 backdrop-blur border-b border-gray-800 sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-left"></i></a>
      <h1 class="font-bold text-lg text-white tracking-wide">ADPEL <span class="text-yellow-500 font-serif">Bíblia Sagrada</span></h1>
    </div>
    <button onclick="toggleFullscreen()" class="text-gray-400 hover:text-white transition p-2" title="Tela Cheia">
      <i class="fas fa-expand" id="fullscreen-icon"></i>
    </button>
  </header>

  <!-- Main -->
  <main class="flex-1 p-4 md:p-6 max-w-5xl mx-auto w-full flex flex-col gap-4">
    <!-- Toolbar -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 bg-[#0f172a]/60 p-4 rounded-xl border border-white/10 backdrop-blur-sm">
      <div class="flex items-center gap-3 flex-wrap">
        <select id="bible-book-select" onchange="mudarLivroBiblia(this.value)" class="bg-[#0f172a] border border-gray-700 text-white text-sm rounded-lg px-3 py-2 focus:ring-2 focus:ring-adpel-500 outline-none min-w-[160px]">
          <option value="">Selecione o Livro</option>
        </select>
        <div id="bible-chapter-selector" class="flex items-center gap-1 flex-wrap max-h-24 overflow-y-auto pr-1"></div>
      </div>
      <div class="flex items-center gap-2">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-2.5 text-gray-500 text-xs"></i>
          <input type="text" id="bible-search-input" placeholder="Ex: João 3:16 ou amor..." class="pl-8 pr-3 py-2 bg-[#0f172a] border border-gray-700 rounded-lg text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-adpel-500 outline-none w-full md:w-56" onkeydown="if(event.key==='Enter')buscarBiblia()">
        </div>
        <button onclick="buscarBiblia()" class="px-3 py-2 bg-adpel-600 hover:bg-adpel-700 text-white rounded-lg text-sm transition"><i class="fas fa-search"></i></button>
      </div>
    </div>

    <!-- Search Results -->
    <div id="bible-search-results" class="hidden flex-1 pergaminho rounded-xl shadow-inner p-4 md:p-6 overflow-y-auto">
      <div class="flex items-center justify-between mb-4 pb-4 border-b-2 border-[#d4c5a9]">
        <div>
          <h3 id="bible-search-title" class="text-lg font-bold text-[#2c1810] font-serif">Resultados</h3>
          <p id="bible-search-count" class="text-sm text-[#8c7a6a]"></p>
        </div>
        <button onclick="voltarLeituraBiblia()" class="px-3 py-1.5 bg-amber-100 hover:bg-amber-200 text-amber-800 rounded-lg text-xs font-medium transition flex items-center gap-1">
          <i class="fas fa-arrow-left"></i> Voltar
        </button>
      </div>
      <div id="bible-loading" class="hidden flex flex-col items-center justify-center py-12">
        <div class="w-10 h-10 border-4 border-[#5c2e0a] border-t-transparent rounded-full animate-spin mb-3"></div>
        <p class="text-[#5c2e0a] text-sm font-serif">Buscando versículos...</p>
      </div>
      <div id="bible-error" class="hidden text-center py-12">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-exclamation-triangle text-2xl text-red-600"></i>
        </div>
        <p id="bible-error-text" class="text-red-700 font-medium"></p>
        <button onclick="buscarBiblia()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700 transition">Tentar novamente</button>
      </div>
      <div id="bible-empty" class="hidden text-center py-12">
        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-search text-2xl text-gray-400"></i>
        </div>
        <p class="text-[#8c7a6a] font-medium mb-1">Nenhum versículo encontrado</p>
        <p class="text-sm text-[#8c7a6a]/70">Tente outro termo de busca ou referência bíblica.</p>
      </div>
      <div id="bible-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- Reading Page -->
    <div id="bible-page" class="flex-1 pergaminho rounded-xl shadow-inner p-6 md:p-10 overflow-y-auto relative min-h-[50vh]">
      <div class="text-center mb-6 border-b-2 border-[#d4c5a9] pb-4">
        <h2 id="bible-current-book" class="text-2xl md:text-3xl font-bold text-[#2c1810] font-serif uppercase tracking-wide">Selecione um Livro</h2>
        <p id="bible-current-chapter" class="text-lg text-[#5c4a3a] font-serif mt-1">e um Capítulo</p>
      </div>
      <div id="bible-verses-content" class="text-[#2c1810] font-serif text-lg leading-loose space-y-1">
        <p class="text-center text-[#8c7a6a] italic mt-8">Selecione um livro e capítulo para começar a leitura.</p>
      </div>
      <div id="bible-page-loading" class="hidden absolute inset-0 bg-[#fdf6e3] flex flex-col items-center justify-center z-10 rounded-xl">
        <div class="w-8 h-8 border-2 border-[#5c2e0a] border-t-transparent rounded-full animate-spin mb-2"></div>
        <p class="text-[#5c2e0a] text-sm font-serif">Carregando...</p>
      </div>
    </div>

    <!-- Footer Nav -->
    <div class="flex items-center justify-between px-2">
      <button onclick="capituloAnterior()" id="btn-capitulo-ant" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg text-sm font-medium transition flex items-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed">
        <i class="fas fa-chevron-left"></i> Anterior
      </button>
      <a href="index.html" class="px-4 py-2 bg-yellow-600/20 hover:bg-yellow-600/30 text-yellow-200 rounded-lg text-sm font-medium transition flex items-center gap-2">
        <i class="fas fa-home"></i> Início
      </a>
      <button onclick="proximoCapitulo()" id="btn-capitulo-prox" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg text-sm font-medium transition flex items-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed">
        Próximo <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </main>

  <script>
    const bibleBooks = [
      "Gênesis","Êxodo","Levítico","Números","Deuteronômio","Josué","Juízes","Rute","1 Samuel","2 Samuel","1 Reis","2 Reis","1 Crônicas","2 Crônicas","Esdras","Neemias","Ester","Jó","Salmos","Provérbios","Eclesiastes","Cantares","Isaías","Jeremias","Lamentações","Ezequiel","Daniel","Oséias","Joel","Amós","Obadias","Jonas","Miquéias","Naum","Habacuque","Sofonias","Ageu","Zacarias","Malaquias",
      "Mateus","Marcos","Lucas","João","Atos","Romanos","1 Coríntios","2 Coríntios","Gálatas","Efésios","Filipenses","Colossenses","1 Tessalonicenses","2 Tessalonicenses","1 Timóteo","2 Timóteo","Tito","Filemom","Hebreus","Tiago","1 Pedro","2 Pedro","1 João","2 João","3 João","Judas","Apocalipse"
    ];

    let currentBibleBook = null;
    let currentBibleChapter = null;

    function escapeHtml(value) {
      if (value == null) return '';
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function populateBibleBooks() {
      const select = document.getElementById('bible-book-select');
      if (!select) return;
      if (select.options.length > 1) return;
      select.innerHTML = '<option value="">Selecione o Livro</option>';
      bibleBooks.forEach(book => {
        const option = document.createElement('option');
        option.value = book;
        option.textContent = book;
        select.appendChild(option);
      });
    }

    function renderChapterButtons(maxChapter) {
      const container = document.getElementById('bible-chapter-selector');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 1; i <= maxChapter; i++) {
        const btn = document.createElement('button');
        btn.className = `chapter-btn ${i === currentBibleChapter ? 'active' : ''}`;
        btn.textContent = i;
        btn.onclick = () => carregarCapitulo(currentBibleBook, i);
        container.appendChild(btn);
      }
    }

    async function carregarCapitulo(book, chapter) {
      if (!book || !chapter) return;
      currentBibleBook = book;
      currentBibleChapter = parseInt(chapter, 10);

      const content = document.getElementById('bible-verses-content');
      const currentBookEl = document.getElementById('bible-current-book');
      const currentChapterEl = document.getElementById('bible-current-chapter');
      const loading = document.getElementById('bible-page-loading');
      const prevBtn = document.getElementById('btn-capitulo-ant');
      const nextBtn = document.getElementById('btn-capitulo-prox');

      if (loading) loading.classList.remove('hidden');
      if (content) content.innerHTML = '';
      if (currentBookEl) currentBookEl.textContent = book;
      if (currentChapterEl) currentChapterEl.textContent = `Capítulo ${currentBibleChapter}`;

      try {
        const { data: verses, error } = await window.supabaseClient
          .from('bible_verses')
          .select('*')
          .eq('book', book)
          .eq('chapter', currentBibleChapter)
          .order('verse', { ascending: true });

        if (error) throw error;

        if (content) {
          if (verses && verses.length > 0) {
            content.innerHTML = verses.map(v =>
              `<p><span class="verse-num">${v.verse}</span>${escapeHtml(v.text)}</p>`
            ).join('');
          } else {
            content.innerHTML = '<p class="text-center text-[#8c7a6a] italic mt-8">Nenhum versículo encontrado para este capítulo.</p>';
          }
        }

        const { data: chapterData, error: chError } = await window.supabaseClient
          .from('bible_verses')
          .select('chapter')
          .eq('book', book)
          .order('chapter', { ascending: false })
          .limit(1);

        let maxChapter = 1;
        if (!chError && chapterData && chapterData.length > 0) {
          maxChapter = chapterData[0].chapter;
        }

        renderChapterButtons(maxChapter);

        if (prevBtn) prevBtn.disabled = currentBibleChapter <= 1;
        if (nextBtn) nextBtn.disabled = currentBibleChapter >= maxChapter;

        const select = document.getElementById('bible-book-select');
        if (select) select.value = book;

      } catch (e) {
        console.error('Erro ao carregar capítulo:', e);
        if (content) content.innerHTML = '<p class="text-center text-red-600 italic mt-8">Erro ao carregar capítulo. Tente novamente.</p>';
      } finally {
        if (loading) loading.classList.add('hidden');
      }
    }

    function capituloAnterior() {
      if (currentBibleBook && currentBibleChapter > 1) {
        carregarCapitulo(currentBibleBook, currentBibleChapter - 1);
      }
    }

    function proximoCapitulo() {
      if (currentBibleBook) {
        carregarCapitulo(currentBibleBook, currentBibleChapter + 1);
      }
    }

    async function mudarLivroBiblia(book) {
      if (!book) return;
      currentBibleBook = book;
      currentBibleChapter = 1;
      await carregarCapitulo(book, 1);
    }

    function mostrarPaginaBiblia() {
      const page = document.getElementById('bible-page');
      const results = document.getElementById('bible-search-results');
      if (page) page.classList.remove('hidden');
      if (results) results.classList.add('hidden');
    }

    function mostrarResultadosBiblia() {
      const page = document.getElementById('bible-page');
      const results = document.getElementById('bible-search-results');
      if (page) page.classList.add('hidden');
      if (results) results.classList.remove('hidden');
    }

    function voltarLeituraBiblia() {
      mostrarPaginaBiblia();
      const input = document.getElementById('bible-search-input');
      if (input) input.value = '';
    }

    async function buscarBiblia() {
      const input = document.getElementById('bible-search-input');
      const termo = input ? input.value.trim() : '';
      if (!termo) return;

      const loadingEl = document.getElementById('bible-loading');
      const resultsEl = document.getElementById('bible-results');
      const emptyEl = document.getElementById('bible-empty');
      const errorEl = document.getElementById('bible-error');

      if (loadingEl) loadingEl.classList.remove('hidden');
      if (resultsEl) resultsEl.innerHTML = '';
      if (emptyEl) emptyEl.classList.add('hidden');
      if (errorEl) {
        errorEl.classList.add('hidden');
        errorEl.textContent = '';
      }

      try {
        let data = [];
        const refRegex = /^(\d?(?:\s)?[A-Za-zÀ-ú]+)\s+(\d+)(?::(\d+))?$/;
        const match = termo.match(refRegex);

        if (match) {
          const book = match[1].trim();
          const chapter = parseInt(match[2], 10);
          const verse = match[3] ? parseInt(match[3], 10) : null;

          let q = window.supabaseClient
            .from('bible_verses')
            .select('*')
            .ilike('book', `%${book}%`)
            .eq('chapter', chapter)
            .limit(20);
          if (verse !== null) q = q.eq('verse', verse);
          const { data: refData, error } = await q;
          if (error) throw error;
          data = refData || [];
        }

        if (data.length === 0) {
          const { data: textData, error } = await window.supabaseClient
            .from('bible_verses')
            .select('*')
            .or(`book.ilike.%${termo}%,text.ilike.%${termo}%`)
            .limit(20);
          if (error) throw error;
          data = textData || [];
        }

        renderBibleResults(data);
      } catch (e) {
        console.error('Erro na busca bíblica:', e);
        mostrarResultadosBiblia();
        if (errorEl) {
          errorEl.textContent = 'Erro ao buscar na Bíblia. Tente novamente.';
          errorEl.classList.remove('hidden');
        }
      } finally {
        if (loadingEl) loadingEl.classList.add('hidden');
      }
    }

    function renderBibleResults(results) {
      const container = document.getElementById('bible-results');
      const emptyEl = document.getElementById('bible-empty');
      const countEl = document.getElementById('bible-search-count');
      if (!container) return;

      if (!results || results.length === 0) {
        container.innerHTML = '';
        if (emptyEl) emptyEl.classList.remove('hidden');
        if (countEl) countEl.textContent = '';
        mostrarResultadosBiblia();
        return;
      }

      if (emptyEl) emptyEl.classList.add('hidden');
      if (countEl) countEl.textContent = `${results.length} versículo(s) encontrado(s)`;
      mostrarResultadosBiblia();

      container.innerHTML = results.map(v => `
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100 hover:shadow-lg transition group">
          <div class="flex items-start justify-between gap-3 mb-2">
            <h4 class="font-bold text-adpel-700 text-sm uppercase tracking-wide">${escapeHtml(v.book)} ${escapeHtml(v.chapter)}:${escapeHtml(v.verse)}</h4>
            <span class="text-[10px] bg-adpel-50 text-adpel-700 px-2 py-0.5 rounded border border-adpel-100">ACF</span>
          </div>
          <p class="text-gray-600 text-base leading-relaxed">${escapeHtml(v.text)}</p>
        </div>
      `).join('');
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
      } else {
        document.exitFullscreen();
      }
    }

    document.addEventListener('fullscreenchange', () => {
      const icon = document.getElementById('fullscreen-icon');
      if (icon) icon.className = document.fullscreenElement ? 'fas fa-compress' : 'fas fa-expand';
    });

    document.addEventListener('DOMContentLoaded', () => {
      populateBibleBooks();
      mudarLivroBiblia('Gênesis');
    });
  </script>
</body>
</html>
